<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta http-equiv="refresh" content="5">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Моніторинг Системи</h1>
        <div class="card shadow-sm p-4">
            {% for key, value in stats.items() %}
            <div class="mb-4">
                <h5 class="text-uppercase">{{ key }} Usage: {{ value }}%</h5>
                <div class="progress" style="height: 30px;">
                    {% set color = "bg-success" %}
                    {% if value > 80 %}
                        {% set color = "bg-danger" %}
                    {% elif value > 50 %}
                        {% set color = "bg-warning" %}
                    {% endif %}
                    <div class="progress-bar {{ color }} progress-bar-striped progress-bar-animated" 
                         role="progressbar" 
                         style="width: {{ value }}%" 
                         aria-valuenow="{{ value }}" 
                         aria-valuemin="0" 
                         aria-valuemax="100">{{ value }}%</div>
                </div>
            </div>
            {% endfor %}
        </div>
        <p class="text-center text-muted mt-3 small">Сторінка оновлюється кожні 5 секунд</p>
    </div>
</body>
</html>
